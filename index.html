<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Phase 7 Golf Event</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    html,body{
      height:100%;
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      overflow:auto; /* ✅ allow scrollbars if needed */
    }
    #app{height:100%;display:flex;flex-direction:column;}
    #toolbar{
      padding:10px 12px;border-bottom:1px solid #e5e7eb;
      display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:#fff;
    }
  #titleRow{
  display:flex;
  align-items:baseline;
  gap:10px;
  flex-wrap:wrap;
}
    #titleRow h1{margin:0;font-size:16px;line-height:1}
    #titleRow .sub{font-size:12px;color:#6b7280}
    .pill{padding:4px 8px;border:1px solid #e5e7eb;border-radius:999px;font-size:12px;background:#f9fafb;}
    .spacer{flex:1}
    .switch{
      display:inline-flex;align-items:center;gap:8px;
      padding:6px 10px;border:1px solid #e5e7eb;border-radius:999px;background:#f9fafb;
      font-size:12px; user-select:none;
    }
    .switch input{transform:scale(1.1)}

    /* ✅ map area scrolls when content is larger than viewport */
    #mapWrapper{
      flex:1;
      position:relative;
      overflow:auto;                 /* ✅ was hidden */
      background:#111827;
      -webkit-overflow-scrolling:touch;
    }

    /* ✅ let canvas define its own layout size so overflow works */
		#mapCanvas{
		  display:block;                 /* important for scrolling */
		  image-rendering:auto;
		  touch-action:manipulation;
		}

    #popup{
      position:absolute;display:none;max-width:340px;background:white;border:1px solid #e5e7eb;border-radius:12px;
      box-shadow:0 10px 30px rgba(0,0,0,.2);padding:10px;z-index:9999;
      pointer-events:auto;
    }
    #popup.hidden{display:none !important;}
    #popup h3{margin:0 0 6px 0;font-size:14px}
    #popup p{margin:0 0 6px 0;font-size:12px;line-height:1.35;color:#111827}
    #popup button{margin-top:8px}
  </style>

  <script>
    window.ENABLE_SEASON_STATIONS = false;

    window.FEATURES = window.FEATURES || {
      events: true,
      animations: true,
      eventTypes: { alligator: true }
    };

    window.EVENT_HIT_RADIUS = window.EVENT_HIT_RADIUS || 40;

    window.MODE = localStorage.getItem("PHASE7_MODE") || (window.MODE || "event");
  </script>
</head>
<body>
  <div id="app">
<div id="toolbar">

<div id="titleRow">
  <h1>Phase 7 Golf Event</h1>
</div>

<!-- <span class="pill">Server: python -m http.server 8000</span> -->

  <select id="courseSelect"></select>
  <select id="holeSelect"></select>
<!--
<span class="pill">MODE: <b id="modeLabel"></b></span>
<span class="pill">Events: <b id="eventsLabel"></b></span>
<span class="pill">Animations: <b id="animLabel"></b></span>
-->
  <span class="spacer"></span>

  <!-- THIS MOVES TO THE RIGHT -->
  <label class="switch" title="Resident mode shows resident details in lot popup">
    <input id="residentModeToggle" type="checkbox"/>
    <span>Resident Mode</span>
  </label>

</div>

    <div id="mapWrapper">
      <canvas id="mapCanvas" width="1500" height="1500"></canvas>
      <div id="popup" class="hidden" aria-hidden="true"></div>
    </div>
  </div>

  <!-- Data -->
  <script src="phase7_merged_lots.js"></script>
  <script src="mapped_sites.js"></script>
  <script src="events.js"></script>
  <script src="golf_overlay_data.js"></script>


  <!-- Renderers -->
<script src="draw_sites.js"></script>
  <script src="draw_lots.js"></script>
  <script src="draw_golf.js"></script>
  <script src="event_engine.js"></script>


  <!-- Core controller -->
  <script src="map_core.js"></script>

  <script>
function updateToolbarLabels() {
  const mode = document.getElementById("modeLabel");
  const events = document.getElementById("eventsLabel");
  const anim = document.getElementById("animLabel");

  if (mode) mode.textContent = window.MODE || "";

  if (events) {
    events.textContent =
      (window.ENABLE_EVENTS === false || (window.FEATURES && window.FEATURES.events === false)) ? "OFF" : "ON";
  }

  if (anim) {
    anim.textContent =
      (window.FEATURES && window.FEATURES.animations === false) ? "OFF" : "ON";
  }
}

    (function bootToolbar() {
      const toggle = document.getElementById("residentModeToggle");
      if (!toggle) return;

      toggle.checked = (window.MODE === "resident");
      updateToolbarLabels();

toggle.addEventListener("change", function () {

  if (toggle.checked) {

    if (!sessionStorage.getItem("residentAuth")) {

      const entered = prompt("Resident access password:");

      if (!entered || entered.trim() !== "parrotHead") {
        alert("Incorrect password");
        toggle.checked = false;
        return;
      }

      sessionStorage.setItem("residentAuth", "true");
    }

    window.MODE = "resident";

  } else {
    window.MODE = "event";
  }

  updateToolbarLabels();

  if (typeof window.setAppMode === "function") {
    window.setAppMode(window.MODE);
  } else {
    if (typeof window.safeDrawLots === "function") window.safeDrawLots();
    else if (typeof window.drawLots === "function") window.drawLots();
  }

});
    })();
  </script>
<script>
  (function initGolfUI(){
    const courseSel = document.getElementById("courseSelect");
    const holeSel   = document.getElementById("holeSelect");
    if (!courseSel || !holeSel) return;

    const data =
      window.GOLF_OVERLAY_DATA ||
      window.golf_overlay_data ||
      window.GOLF_DATA ||
      null;

    if (!data) {
      console.warn("Golf UI: no golf overlay data found on window.");
      courseSel.innerHTML = "<option>Golf data missing</option>";
      holeSel.innerHTML = "<option>-</option>";
      return;
    }

    const courses = Array.isArray(data.courses) ? data.courses : [];

    courseSel.innerHTML = "";
    holeSel.innerHTML = "";

    function setActive() {
      window.GOLF_ACTIVE_COURSE = courseSel.value || "";
      window.GOLF_ACTIVE_HOLE = holeSel.value ? Number(holeSel.value) : null;

      localStorage.setItem("GOLF_ACTIVE_COURSE", window.GOLF_ACTIVE_COURSE);
      localStorage.setItem("GOLF_ACTIVE_HOLE", holeSel.value || "");

      if (typeof window.safeDrawLots === "function") window.safeDrawLots();
      else if (typeof window.drawLots === "function") window.drawLots();
    }

    function rebuildHoles() {
      const courseName = courseSel.value;
      const course = courses.find(c => c.course_name === courseName || c.name === courseName) || courses[0];

      holeSel.innerHTML = "";

      const holes = (course && Array.isArray(course.holes)) ? course.holes : [];

      holeSel.insertAdjacentHTML("beforeend", `<option value="">All holes</option>`);

      holes.forEach(h => {
        const n = Number(h.hole_number);
        if (!Number.isFinite(n)) return;
        holeSel.insertAdjacentHTML("beforeend", `<option value="${n}">Hole ${n}</option>`);
      });

      const savedHole = localStorage.getItem("GOLF_ACTIVE_HOLE");

if ([...holeSel.options].some(o => o.value === "1")) {
  holeSel.value = "1";
} else {
  holeSel.value = "";
}

      setActive();
    }

    courseSel.insertAdjacentHTML("beforeend", `<option value="">Select course</option>`);

    courses.forEach(c => {
      const name = c.course_name || c.name || "";
      if (!name) return;
      courseSel.insertAdjacentHTML("beforeend", `<option value="${name}">${name}</option>`);
    });

    const savedCourse = localStorage.getItem("GOLF_ACTIVE_COURSE");

    if (savedCourse && [...courseSel.options].some(o => o.value === savedCourse)) {
      courseSel.value = savedCourse;
    } else if (courses[0] && (courses[0].course_name || courses[0].name)) {
      courseSel.value = courses[0].course_name || courses[0].name;
    } else {
      courseSel.value = "";
    }

    rebuildHoles();

    courseSel.addEventListener("change", () => {
      rebuildHoles();
    });

    holeSel.addEventListener("change", () => {
      setActive();
    });
  })();
</script>
  
</body>
</html>
