  <script>
function updateToolbarLabels() {
  const mode = document.getElementById("modeLabel");
  const events = document.getElementById("eventsLabel");
  const anim = document.getElementById("animLabel");

  if (mode) mode.textContent = window.MODE || "";

  if (events) {
    events.textContent =
      (window.ENABLE_EVENTS === false || (window.FEATURES && window.FEATURES.events === false)) ? "OFF" : "ON";
  }

  if (anim) {
    anim.textContent =
      (window.FEATURES && window.FEATURES.animations === false) ? "OFF" : "ON";
  }
}

    (function bootToolbar() {
      const toggle = document.getElementById("residentModeToggle");
      if (!toggle) return;

      toggle.checked = (window.MODE === "resident");
      updateToolbarLabels();

toggle.addEventListener("change", function () {

  if (toggle.checked) {

    if (!sessionStorage.getItem("residentAuth")) {

      const entered = prompt("Resident access password:");

      if (!entered || entered.trim() !== "parrotHead") {
        alert("Incorrect password");
        toggle.checked = false;
        return;
      }

      sessionStorage.setItem("residentAuth", "true");
    }

    window.MODE = "resident";

  } else {
    window.MODE = "event";
  }

  updateToolbarLabels();

  if (typeof window.setAppMode === "function") {
    window.setAppMode(window.MODE);
  } else {
    if (typeof window.safeDrawLots === "function") window.safeDrawLots();
    else if (typeof window.drawLots === "function") window.drawLots();
  }

});
    })();

<script>
(function initGolfUI() {
  const courseSel = document.getElementById("courseSelect");
  const holeSel = document.getElementById("holeSelect");
  if (!courseSel || !holeSel) return;

  const data =
    window.GOLF_OVERLAY_DATA ||
    window.golf_overlay_data ||
    window.GOLF_DATA ||
    null;

  if (!data) {
    console.warn("Golf UI: no golf overlay data found on window.");
    courseSel.innerHTML = "<option>Golf data missing</option>";
    holeSel.innerHTML = "<option>-</option>";
    return;
  }

  const courses = Array.isArray(data.courses) ? data.courses : [];

  courseSel.innerHTML = "";
  holeSel.innerHTML = "";

  function setActive() {
    window.GOLF_ACTIVE_COURSE = courseSel.value || "";
    window.GOLF_ACTIVE_HOLE = holeSel.value ? Number(holeSel.value) : null;

    // IMPORTANT: this drives the highlight ring
    window.selectedHole = holeSel.value ? Number(holeSel.value) : null;
    window.GOLF_SELECTED_HOLE_NUMBER = window.selectedHole;

    localStorage.setItem("GOLF_ACTIVE_COURSE", window.GOLF_ACTIVE_COURSE);
    localStorage.setItem("GOLF_ACTIVE_HOLE", holeSel.value || "");

    if (typeof window.safeDrawGolf === "function") {
      window.safeDrawGolf();
    }

    if (typeof window.safeDrawLots === "function") {
      window.safeDrawLots();
    } else if (typeof window.drawLots === "function") {
      window.drawLots();
    }
  }

  function rebuildHoles() {
    const courseName = courseSel.value;
    const course =
      courses.find(c => c.course_name === courseName || c.name === courseName) ||
      courses[0];

    holeSel.innerHTML = "";

    const holes = (course && Array.isArray(course.holes)) ? course.holes : [];

    holeSel.insertAdjacentHTML("beforeend", '<option value="">All holes</option>');

    holes.forEach(h => {
      const n = Number(h.hole_number);
      if (!Number.isFinite(n)) return;

      holeSel.insertAdjacentHTML(
        "beforeend",
        `<option value="${n}">Hole ${n}</option>`
      );
    });

    const savedHole = localStorage.getItem("GOLF_ACTIVE_HOLE");

    if (savedHole && [...holeSel.options].some(o => o.value === savedHole)) {
      holeSel.value = savedHole;
    } else if ([...holeSel.options].some(o => o.value === "1")) {
      holeSel.value = "1";
    } else {
      holeSel.value = "";
    }

    setActive();
  }

  courseSel.insertAdjacentHTML("beforeend", '<option value="">Select course</option>');

  courses.forEach(c => {
    const name = c.course_name || c.name || "";
    if (!name) return;

    courseSel.insertAdjacentHTML(
      "beforeend",
      `<option value="${name}">${name}</option>`
    );
  });

  const savedCourse = localStorage.getItem("GOLF_ACTIVE_COURSE");

  if (savedCourse && [...courseSel.options].some(o => o.value === savedCourse)) {
    courseSel.value = savedCourse;
  } else if (courses[0] && (courses[0].course_name || courses[0].name)) {
    courseSel.value = courses[0].course_name || courses[0].name;
  } else {
    courseSel.value = "";
  }

  rebuildHoles();

  courseSel.addEventListener("change", function () {
    rebuildHoles();
  });

  holeSel.addEventListener("change", function () {
    setActive();
  });
})();
</script>

<script>
(function () {
  const BASE_W = 1500;
  const BASE_H = 1500;
  window.zoomScale = window.zoomScale || 1;

  function getMapEls() {
    return {
      wrapper: document.getElementById("mapWrapper"),
      zoom: document.getElementById("mapZoom"),
      canvas: document.getElementById("mapCanvas")
    };
  }

  window.applyMapZoom = function applyMapZoom() {
    const els = getMapEls();
    if (!els.zoom) return;
    const z = Math.max(0.5, Math.min(4, Number(window.zoomScale) || 1));
    window.zoomScale = z;
    els.zoom.style.width = (BASE_W * z) + "px";
    els.zoom.style.height = (BASE_H * z) + "px";
    if (els.canvas) {
      els.canvas.style.width = (BASE_W * z) + "px";
      els.canvas.style.height = (BASE_H * z) + "px";
    }
  };

  window.centerMapOn = window.centerMapOn || function (mapX, mapY) {
    const els = getMapEls();
    if (!els.wrapper) return;
    const z = Math.max(0.5, Math.min(4, Number(window.zoomScale) || 1));
    const targetX = Number(mapX) * z;
    const targetY = Number(mapY) * z;
    els.wrapper.scrollLeft = Math.max(0, targetX - els.wrapper.clientWidth / 2);
    els.wrapper.scrollTop = Math.max(0, targetY - els.wrapper.clientHeight / 2);
  };

  function bindPinch() {
    const els = getMapEls();
    if (!els.wrapper) return;
    let startDist = null;
    let startZoom = null;
    let pinchMidX = null;
    let pinchMidY = null;

    function dist2(t1, t2) {
      const dx = t1.clientX - t2.clientX;
      const dy = t1.clientY - t2.clientY;
      return Math.hypot(dx, dy);
    }

    els.wrapper.addEventListener("touchstart", function (e) {
      if (e.touches && e.touches.length === 2) {
        startDist = dist2(e.touches[0], e.touches[1]);
        startZoom = window.zoomScale || 1;
        pinchMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        pinchMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      }
    }, { passive: true });

    els.wrapper.addEventListener("touchmove", function (e) {
      if (!(e.touches && e.touches.length === 2) || !startDist || !startZoom) {
        return; // let one-finger scrolling stay native
      }

      e.preventDefault();

      const newDist = dist2(e.touches[0], e.touches[1]);
      const nextZoom = Math.max(0.5, Math.min(4, startZoom * (newDist / startDist)));
      const oldZoom = window.zoomScale || 1;

      const rect = els.wrapper.getBoundingClientRect();
      const midX = pinchMidX != null ? pinchMidX : ((e.touches[0].clientX + e.touches[1].clientX) / 2);
      const midY = pinchMidY != null ? pinchMidY : ((e.touches[0].clientY + e.touches[1].clientY) / 2);

      const mapX = (els.wrapper.scrollLeft + (midX - rect.left)) / oldZoom;
      const mapY = (els.wrapper.scrollTop + (midY - rect.top)) / oldZoom;

      window.zoomScale = nextZoom;
      window.applyMapZoom();

      els.wrapper.scrollLeft = Math.max(0, mapX * nextZoom - (midX - rect.left));
      els.wrapper.scrollTop = Math.max(0, mapY * nextZoom - (midY - rect.top));
    }, { passive: false });

    els.wrapper.addEventListener("touchend", function (e) {
      if (!e.touches || e.touches.length < 2) {
        startDist = null;
        startZoom = null;
        pinchMidX = null;
        pinchMidY = null;
      }
    }, { passive: true });

    els.wrapper.addEventListener("touchcancel", function () {
      startDist = null;
      startZoom = null;
      pinchMidX = null;
      pinchMidY = null;
    }, { passive: true });
  }

  function initMapZoom() {
    window.applyMapZoom();
    bindPinch();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initMapZoom, { once: true });
  } else {
    initMapZoom();
  }
})();
</script>
